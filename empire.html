<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Empire Clicker</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      background:#111;
      color:#fff;
      margin:0;
      padding:20px;
    }
    h1{ margin-top: 10px; }
    button{
      padding:10px 14px;
      margin:6px;
      font-size:16px;
      cursor:pointer;
      border-radius:10px;
      border:0;
      background:#2b2b2b;
      color:#fff;
    }
    button:hover{ filter:brightness(1.15); }
    .box{
      background:#1c1c1c;
      padding:15px;
      margin:12px auto;
      border-radius:12px;
      max-width: 520px;
      border:1px solid #2a2a2a;
    }
    .small{
      opacity:.85;
      font-size:14px;
      margin-top:8px;
    }
    .stats{
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin: 10px 0 0;
    }
    .pill{
      background:#222;
      border:1px solid #2f2f2f;
      padding:10px 12px;
      border-radius:999px;
      min-width: 170px;
    }
    .pill b{ font-size: 18px; }
  </style>
</head>
<body>

  <h1>Empire Clicker 💰</h1>

  <div class="stats">
    <div class="pill">Dinero: <b>€<span id="money">0</span></b></div>
    <div class="pill">€/seg: <b>€<span id="income">0</span></b></div>
    <div class="pill">Prestigio: <b><span id="prestige">0</span></b> | Mult: <b>x<span id="multi">1</span></b></div>
  </div>

  <div class="box">
    <button onclick="clickMoney()">Trabajar (+1€)</button>
    <div class="small">Tip: el multiplicador afecta a TODO (clics + ingresos).</div>
  </div>

  <div class="box">
    <h3>Negocios</h3>
    <button onclick="buy(1)">Puesto de Limonada (€50) → +1€/seg</button>
    <button onclick="buy(2)">Tienda Online (€500) → +10€/seg</button>
    <button onclick="buy(3)">Empresa Tecnológica (€5000) → +100€/seg</button>
  </div>

  <div class="box">
    <h3>Prestigio</h3>
    <button id="prestigeBtn" onclick="prestigeAction()">Hacer Prestigio</button>
    <div class="small">
      Requisito actual: €<span id="prestigeNeed">100000</span> (sube +10.000 por prestigio total)
      <br/>
      Ganancia prevista: ⌊(€/seg ÷ requisito)⌋
    </div>
  </div>

<script>
  // Estado
  let money = 0;
  let income = 0;

  // Prestigio
  let prestige = 0;        // prestigio total acumulado (nivel)
  let multi = 1;           // multiplicador = 1 + prestige
  const BASE_NEED = 100000;
  const STEP_NEED = 10000;

  function prestigeNeed(){
    return BASE_NEED + (prestige * STEP_NEED);
  }

  function fmt(n){
    return Math.floor(n).toLocaleString("es-ES");
  }

  function updateUI(){
    document.getElementById("money").innerText = fmt(money);
    document.getElementById("income").innerText = fmt(income * multi); // mostramos ingreso real con multi aplicado
    document.getElementById("prestige").innerText = prestige;
    document.getElementById("multi").innerText = multi;
    document.getElementById("prestigeNeed").innerText = fmt(prestigeNeed());

    // Texto del botón con info útil
    const need = prestigeNeed();
    const realIncomePerSec = income * multi;
    const gain = Math.floor(realIncomePerSec / need);
    document.getElementById("prestigeBtn").innerText =
      `Prestigio (ganas ${gain} | req €${fmt(need)})`;
  }

  function clickMoney(){
    money += 1 * multi;
    updateUI();
  }

  function buy(type){
    if(type === 1 && money >= 50){
      money -= 50;
      income += 1;
    } else if(type === 2 && money >= 500){
      money -= 500;
      income += 10;
    } else if(type === 3 && money >= 5000){
      money -= 5000;
      income += 100;
    }
    updateUI();
  }

  function prestigeAction(){
    const need = prestigeNeed();
    const realIncomePerSec = income * multi;
    const gain = Math.floor(realIncomePerSec / need);

    if(gain <= 0){
      const ok = confirm(
        `⚠️ Tienes €${fmt(realIncomePerSec)}/seg y el requisito es €${fmt(need)}.\n` +
        `Si haces prestigio AHORA, NO ganarás prestigio (0).\n\n¿Seguro que quieres hacerlo igualmente?`
      );
      if(!ok) return;
      // reinicia sin ganar
      money = 0;
      income = 0;
      updateUI();
      return;
    }

    const ok = confirm(
      `✅ Con €${fmt(realIncomePerSec)}/seg y requisito €${fmt(need)},\n` +
      `ganarás ${gain} prestigio.\n\n¿Confirmas hacer prestigio?`
    );
    if(!ok) return;

    prestige += gain;
    multi = 1 + prestige;

    // reinicio
    money = 0;
    income = 0;

    updateUI();
  }

  // Tick: dinero automático cada segundo
  setInterval(() => {
    money += (income * multi);
    updateUI();
  }, 1000);

  updateUI();
</script>

</body>
</html>
