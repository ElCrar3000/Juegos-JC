<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juegos JC - Survival Base</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #071018;
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas {
      display: block;
      background: #14311f;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 12px 14px;
      width: 300px;
      line-height: 1.45;
      font-size: 14px;
      z-index: 10;
    }
    #hud h1 {
      margin: 0 0 8px;
      font-size: 18px;
      color: #ffe66d;
    }
    #hud .small { color: #c9d7c9; font-size: 12px; }
    #gameOver {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 20;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
    }
    #gameOver div {
      background: #101b2b;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 18px;
      padding: 25px;
      max-width: 430px;
    }
    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: 0;
      border-radius: 10px;
      background: #ffe66d;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <h1>Juegos JC Survival</h1>
    <div>❤️ Vida: <span id="life">100</span></div>
    <div>💰 Dinero: <span id="money">0</span></div>
    <div>🔩 Chatarra: <span id="scrap">0</span></div>
    <div>💾 Chips: <span id="chips">0</span></div>
    <div>📍 Distancia base: <span id="distance">0</span> m</div>
    <div>⚠️ Zona: <span id="zone">Base</span></div>
    <div>👾 Enemigos: <span id="enemyCount">0</span></div>
    <hr>
    <div class="small">Mover: flechas / WASD</div>
    <div class="small">Atacar: tecla 1</div>
    <div class="small">Recoger: pasar por encima</div>
  </div>

  <div id="gameOver">
    <div>
      <h2>Has caído</h2>
      <p>Los Skibidi y Camarans han podido contigo. Pero esto es solo una beta, no una derrota.</p>
      <button onclick="location.reload()">Reiniciar</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const keys = {};
    window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

    const hud = {
      life: document.getElementById('life'),
      money: document.getElementById('money'),
      scrap: document.getElementById('scrap'),
      chips: document.getElementById('chips'),
      distance: document.getElementById('distance'),
      zone: document.getElementById('zone'),
      enemyCount: document.getElementById('enemyCount')
    };

    const player = {
      x: 0,
      y: 0,
      size: 26,
      speed: 3.2,
      life: 100,
      maxLife: 100,
      damage: 5,
      attackRange: 58,
      attackCooldown: 0,
      money: 0,
      scrap: 0,
      chips: 0
    };

    const base = {
      x: 0,
      y: 0,
      size: 130
    };

    let camera = { x: 0, y: 0 };
    let enemies = [];
    let resources = [];
    let particles = [];
    let gameTime = 0;
    let lastCatSpawn = 0;
    let lastSkibidiSpawn = 0;
    let lastResourceSpawn = 0;
    let gameRunning = true;

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function getDifficultyByDistance(x, y) {
      const d = Math.hypot(x, y);
      if (d < 450) return { name: 'Base', mult: 1, color: '#59d36c' };
      if (d < 1000) return { name: 'Normal', mult: 2, color: '#ffe66d' };
      if (d < 1800) return { name: 'Difícil', mult: 5, color: '#ff9f43' };
      return { name: 'Bestia', mult: 10, color: '#ff4d4d' };
    }

    function worldToScreen(x, y) {
      return {
        x: x - camera.x + canvas.width / 2,
        y: y - camera.y + canvas.height / 2
      };
    }

    function randomAroundPlayer(min, max) {
      const angle = Math.random() * Math.PI * 2;
      const dist = min + Math.random() * (max - min);
      return {
        x: player.x + Math.cos(angle) * dist,
        y: player.y + Math.sin(angle) * dist
      };
    }

    function spawnEnemy(type, nearBase = false) {
      let pos;
      if (nearBase) {
        const angle = Math.random() * Math.PI * 2;
        pos = {
          x: Math.cos(angle) * 230,
          y: Math.sin(angle) * 230
        };
      } else {
        pos = randomAroundPlayer(450, 800);
      }

      const diff = getDifficultyByDistance(pos.x, pos.y);
      let enemy;

      if (type === 'gato') {
        enemy = {
          type: 'Gato',
          x: pos.x,
          y: pos.y,
          size: 22,
          life: 10 * diff.mult,
          maxLife: 10 * diff.mult,
          damage: 2 * diff.mult,
          speed: 1.3 + diff.mult * 0.08,
          attackCooldown: 0,
          attackEvery: 1500,
          color: '#c084fc'
        };
      } else {
        enemy = {
          type: 'Skibidi',
          x: pos.x,
          y: pos.y,
          size: 30,
          life: 20 * diff.mult,
          maxLife: 20 * diff.mult,
          damage: 5 * diff.mult,
          speed: 1 + diff.mult * 0.05,
          attackCooldown: 0,
          attackEvery: 2000,
          color: '#f87171'
        };
      }

      enemies.push(enemy);
    }

    function spawnResource() {
      const pos = randomAroundPlayer(200, 900);
      const roll = Math.random();
      let res;

      if (roll < 0.45) {
        res = { type: 'money', label: 'Dinero', amount: 10, color: '#ffd166', size: 18 };
      } else if (roll < 0.78) {
        res = { type: 'scrap', label: 'Chatarra', amount: 5, color: '#a3a3a3', size: 18 };
      } else {
        res = { type: 'chips', label: 'Chips', amount: 2, color: '#5eead4', size: 18 };
      }

      resources.push({ ...res, x: pos.x, y: pos.y });
    }

    function addParticle(x, y, text, color) {
      particles.push({ x, y, text, color, life: 60 });
    }

    function updatePlayer(dt) {
      let dx = 0, dy = 0;
      if (keys['arrowup'] || keys['w']) dy -= 1;
      if (keys['arrowdown'] || keys['s']) dy += 1;
      if (keys['arrowleft'] || keys['a']) dx -= 1;
      if (keys['arrowright'] || keys['d']) dx += 1;

      if (dx || dy) {
        const len = Math.hypot(dx, dy);
        player.x += (dx / len) * player.speed;
        player.y += (dy / len) * player.speed;
      }

      if (player.attackCooldown > 0) player.attackCooldown -= dt;

      if (keys['1'] && player.attackCooldown <= 0) {
        player.attackCooldown = 450;
        attack();
      }

      // Cura lenta dentro de la base
      if (Math.abs(player.x) < base.size / 2 && Math.abs(player.y) < base.size / 2 && player.life < player.maxLife) {
        player.life = Math.min(player.maxLife, player.life + 0.02);
      }
    }

    function attack() {
      let hit = false;
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (distance(player, e) < player.attackRange + e.size / 2) {
          e.life -= player.damage;
          addParticle(e.x, e.y - 20, '-' + player.damage, '#ffffff');
          hit = true;
          if (e.life <= 0) {
            const reward = e.type === 'Skibidi' ? 30 : 10;
            player.money += reward;
            addParticle(e.x, e.y, '+' + reward + '€', '#ffd166');
            enemies.splice(i, 1);
          }
          break;
        }
      }
      if (!hit) addParticle(player.x, player.y - 35, 'Fallo', '#cbd5e1');
    }

    function updateEnemies(dt) {
      for (const e of enemies) {
        const ang = Math.atan2(player.y - e.y, player.x - e.x);
        const d = distance(player, e);

        if (d > player.size / 2 + e.size / 2 + 6) {
          e.x += Math.cos(ang) * e.speed;
          e.y += Math.sin(ang) * e.speed;
        }

        if (e.attackCooldown > 0) e.attackCooldown -= dt;

        if (d < player.size / 2 + e.size / 2 + 10 && e.attackCooldown <= 0) {
          player.life -= e.damage;
          e.attackCooldown = e.attackEvery;
          addParticle(player.x, player.y - 25, '-' + e.damage, '#ff6b6b');
        }
      }
    }

    function updateResources() {
      for (let i = resources.length - 1; i >= 0; i--) {
        const r = resources[i];
        if (distance(player, r) < player.size / 2 + r.size / 2 + 8) {
          if (r.type === 'money') player.money += Math.min(r.amount, 10);
          if (r.type === 'scrap') player.scrap += Math.min(r.amount, 5);
          if (r.type === 'chips') player.chips += r.amount;
          addParticle(r.x, r.y, '+' + r.amount + ' ' + r.label, r.color);
          resources.splice(i, 1);
        }
      }
    }

    function updateSpawns() {
      // gato cada 60 segundos
      if (gameTime - lastCatSpawn > 60000) {
        spawnEnemy('gato');
        lastCatSpawn = gameTime;
      }

      // skibidi cada 3 minutos, cerca de la base
      if (gameTime - lastSkibidiSpawn > 180000) {
        spawnEnemy('skibidi', true);
        lastSkibidiSpawn = gameTime;
      }

      // recursos frecuentes
      if (gameTime - lastResourceSpawn > 2500 && resources.length < 80) {
        spawnResource();
        lastResourceSpawn = gameTime;
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].y -= 0.5;
        particles[i].life--;
        if (particles[i].life <= 0) particles.splice(i, 1);
      }
    }

    function drawGrid() {
      const gridSize = 80;
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;

      const startX = Math.floor((camera.x - canvas.width / 2) / gridSize) * gridSize;
      const endX = camera.x + canvas.width / 2 + gridSize;
      const startY = Math.floor((camera.y - canvas.height / 2) / gridSize) * gridSize;
      const endY = camera.y + canvas.height / 2 + gridSize;

      for (let x = startX; x < endX; x += gridSize) {
        const sx = worldToScreen(x, 0).x;
        ctx.beginPath();
        ctx.moveTo(sx, 0);
        ctx.lineTo(sx, canvas.height);
        ctx.stroke();
      }

      for (let y = startY; y < endY; y += gridSize) {
        const sy = worldToScreen(0, y).y;
        ctx.beginPath();
        ctx.moveTo(0, sy);
        ctx.lineTo(canvas.width, sy);
        ctx.stroke();
      }
    }

    function drawBase() {
      const p = worldToScreen(base.x, base.y);
      ctx.fillStyle = '#1f7a3b';
      ctx.fillRect(p.x - base.size / 2, p.y - base.size / 2, base.size, base.size);
      ctx.strokeStyle = '#ffe66d';
      ctx.lineWidth = 4;
      ctx.strokeRect(p.x - base.size / 2, p.y - base.size / 2, base.size, base.size);
      ctx.fillStyle = 'white';
      ctx.font = 'bold 18px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('BASE', p.x, p.y + 6);
    }

    function drawPlayer() {
      const p = worldToScreen(player.x, player.y);
      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();
      ctx.arc(p.x, p.y, player.size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();

      if (player.attackCooldown > 350) {
        ctx.strokeStyle = 'rgba(255,255,255,0.55)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, player.attackRange, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function drawEnemies() {
      for (const e of enemies) {
        const p = worldToScreen(e.x, e.y);
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, e.size / 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = 'white';
        ctx.font = '11px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(e.type, p.x, p.y - e.size);

        // barra de vida
        const w = 42;
        ctx.fillStyle = '#3f1111';
        ctx.fillRect(p.x - w/2, p.y + e.size/2 + 6, w, 5);
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(p.x - w/2, p.y + e.size/2 + 6, w * Math.max(0, e.life / e.maxLife), 5);
      }
    }

    function drawResources() {
      for (const r of resources) {
        const p = worldToScreen(r.x, r.y);
        ctx.fillStyle = r.color;
        ctx.beginPath();
        ctx.rect(p.x - r.size/2, p.y - r.size/2, r.size, r.size);
        ctx.fill();
      }
    }

    function drawParticles() {
      for (const part of particles) {
        const p = worldToScreen(part.x, part.y);
        ctx.globalAlpha = part.life / 60;
        ctx.fillStyle = part.color;
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(part.text, p.x, p.y);
        ctx.globalAlpha = 1;
      }
    }

    function drawDangerRings() {
      const rings = [450, 1000, 1800];
      const colors = ['rgba(255,230,109,0.15)', 'rgba(255,159,67,0.15)', 'rgba(255,77,77,0.15)'];
      const center = worldToScreen(0, 0);
      for (let i = 0; i < rings.length; i++) {
        ctx.strokeStyle = colors[i];
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(center.x, center.y, rings[i], 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    function updateHud() {
      const d = Math.floor(Math.hypot(player.x, player.y));
      const z = getDifficultyByDistance(player.x, player.y);
      hud.life.textContent = Math.max(0, Math.floor(player.life));
      hud.money.textContent = player.money;
      hud.scrap.textContent = player.scrap;
      hud.chips.textContent = player.chips;
      hud.distance.textContent = d;
      hud.zone.textContent = z.name;
      hud.zone.style.color = z.color;
      hud.enemyCount.textContent = enemies.length;
    }

    function loop(timestamp) {
      if (!loop.last) loop.last = timestamp;
      const dt = timestamp - loop.last;
      loop.last = timestamp;
      gameTime += dt;

      if (!gameRunning) return;

      updatePlayer(dt);
      updateEnemies(dt);
      updateResources();
      updateSpawns();
      updateParticles();

      camera.x = player.x;
      camera.y = player.y;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawDangerRings();
      drawBase();
      drawResources();
      drawEnemies();
      drawPlayer();
      drawParticles();
      updateHud();

      if (player.life <= 0) {
        gameRunning = false;
        document.getElementById('gameOver').style.display = 'flex';
        return;
      }

      requestAnimationFrame(loop);
    }

    // Inicio: recursos y enemigos iniciales
    for (let i = 0; i < 25; i++) spawnResource();
    spawnEnemy('gato');
    spawnEnemy('gato');

    requestAnimationFrame(loop);
  </script>
</body>
</html>
