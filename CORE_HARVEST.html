<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CORE HARVEST: INFINITE</title>
<style>
  body { margin:0; background:#0b0f1a; overflow:hidden; color:white; font-family:Arial;}
  canvas { display:block; }
  #ui {
    position:fixed; top:10px; left:10px;
    background:rgba(0,0,0,0.5); padding:10px; border-radius:10px;
  }
</style>
</head>
<body>

<div id="ui">
  ❤️ Vida: <span id="hp">100</span><br>
  ⚡ Nivel: <span id="lvl">1</span><br>
  💰 Oro: <span id="gold">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {x:400, y:300, hp:100, lvl:1, gold:0, dmg:5};
let enemies = [];
let keys = {};

document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

function spawnEnemy(){
  enemies.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    hp: 10 + player.lvl*2,
    speed: 0.5 + player.lvl*0.05
  });
}

setInterval(spawnEnemy, 1000);

function update(){
  // Movimiento
  if(keys["ArrowUp"]) player.y -= 3;
  if(keys["ArrowDown"]) player.y += 3;
  if(keys["ArrowLeft"]) player.x -= 3;
  if(keys["ArrowRight"]) player.x += 3;

  enemies.forEach(e=>{
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.sqrt(dx*dx+dy*dy);

    e.x += dx/dist * e.speed;
    e.y += dy/dist * e.speed;

    if(dist < 20){
      player.hp -= 0.1;
    }

    // auto ataque
    if(dist < 80){
      e.hp -= player.dmg * 0.02;
    }
  });

  // eliminar muertos
  enemies = enemies.filter(e=>{
    if(e.hp <= 0){
      player.gold += 1;
      return false;
    }
    return true;
  });

  // subir nivel
  if(player.gold >= player.lvl*10){
    player.gold = 0;
    player.lvl++;
    player.dmg += 2;
    player.hp += 20;
  }

  document.getElementById("hp").textContent = Math.floor(player.hp);
  document.getElementById("lvl").textContent = player.lvl;
  document.getElementById("gold").textContent = player.gold;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // jugador
  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(player.x, player.y, 10, 0, Math.PI*2);
  ctx.fill();

  // enemigos
  enemies.forEach(e=>{
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(e.x, e.y, 8, 0, Math.PI*2);
    ctx.fill();
  });
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
