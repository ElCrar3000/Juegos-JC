<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Color Match | Juegos JC</title>
<style>
  :root {
    --bg: #070b16;
    --text: #f8fafc;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #a855f7;
    --line: rgba(255,255,255,0.12);
    --c1: #fb7185;
    --c2: #facc15;
    --c3: #22c55e;
    --c4: #38bdf8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background:
      radial-gradient(circle at top left, rgba(56,189,248,0.25), transparent 35%),
      radial-gradient(circle at top right, rgba(168,85,247,0.25), transparent 35%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }
  h1 {
    margin: 10px 0;
    font-size: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .hud {
    display: flex;
    gap: 12px;
    margin-bottom: 18px;
    font-weight: 900;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    background: rgba(255,255,255,0.06);
    padding: 8px 16px;
    border-radius: 12px;
    border: 1px solid var(--line);
    font-size: 14px;
  }
  .stat.score { color: var(--accent); }
  .stat.combo { color: var(--accent2); }
  .stat.lives { color: var(--c1); }
 
  .sound-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--line);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
  }
  .sound-toggle:hover { color: var(--accent); }
 
  .arena {
    width: 100%;
    max-width: 500px;
    background: rgba(16,24,39,0.85);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    text-align: center;
    position: relative;
    z-index: 1;
  }
 
  .target {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin: 10px auto 30px;
    background: var(--c1);
    box-shadow: 0 0 60px currentColor;
    transition: background-color 0.15s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    font-weight: 900;
    color: rgba(0,0,0,0.3);
  }
  .target.flash { transform: scale(1.15) rotate(-5deg); }
  .target.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px) rotate(-3deg); }
    40% { transform: translateX(10px) rotate(3deg); }
    60% { transform: translateX(-8px) rotate(-2deg); }
    80% { transform: translateX(8px) rotate(2deg); }
  }
 
  .timer-bar {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .timer-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 100%;
    transition: width 0.05s linear;
  }
  .timer-fill.danger {
    background: linear-gradient(90deg, var(--c2), var(--c1));
  }
 
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .color-btn {
    height: 80px;
    border-radius: 16px;
    border: 3px solid transparent;
    font-size: 16px;
    font-weight: 900;
    color: rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.08s, filter 0.1s;
  }
  .color-btn:active {
    transform: scale(0.9);
    filter: brightness(1.3);
  }
  .color-btn.c1 { background: var(--c1); }
  .color-btn.c2 { background: var(--c2); }
  .color-btn.c3 { background: var(--c3); }
  .color-btn.c4 { background: var(--c4); }
 
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(7,11,22,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .overlay.hidden { display: none; }
  .panel {
    background: linear-gradient(135deg, rgba(16,24,39,0.95), rgba(22,34,56,0.95));
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 36px;
    text-align: center;
    max-width: 420px;
  }
  .panel h2 { margin: 0 0 12px; font-size: 32px; }
  .panel p { color: var(--muted); line-height: 1.5; }
  .btn {
    padding: 14px 24px;
    border-radius: 14px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #020617;
    border: none;
    cursor: pointer;
    font-size: 16px;
    margin-top: 12px;
  }
  .btn:hover { filter: brightness(1.1); }
  .back {
    position: fixed;
    top: 16px;
    left: 16px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
    background: rgba(255,255,255,0.06);
    padding: 8px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
  }
  .hint { color: var(--muted); font-size: 13px; margin: 14px 0 0; }
 
  .screen-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: var(--c3);
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 5;
  }
  .screen-flash.show { opacity: 0.25; }
  .screen-flash.gold { background: var(--c2); }
 
  .combo-popup {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    font-size: 72px;
    font-weight: 900;
    color: var(--c2);
    text-shadow: 0 0 30px var(--c2);
    pointer-events: none;
    z-index: 6;
    transition: transform 0.3s, opacity 0.6s;
    opacity: 0;
    text-align: center;
    white-space: nowrap;
  }
  .combo-popup.show {
    transform: translateX(-50%) scale(1);
    opacity: 1;
  }
</style>
</head>
<body>
 
<a href="index.html" class="back">← Volver</a>
<button class="sound-toggle" id="soundToggle">🔊 Sonido</button>
 
<div class="screen-flash" id="screenFlash"></div>
<div class="combo-popup" id="comboPopup"></div>
 
<h1>Color Match</h1>
 
<div class="hud">
  <div class="stat score">Puntos: <span id="score">0</span></div>
  <div class="stat combo">Combo: <span id="combo">0</span></div>
  <div class="stat lives">Vidas: <span id="lives">3</span></div>
  <div class="stat">Récord: <span id="best">0</span></div>
  <div class="stat">Mejor combo: <span id="bestCombo">0</span></div>
</div>
 
<div class="arena">
  <div class="target" id="target">?</div>
  <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  <div class="buttons">
    <button class="color-btn c1" data-color="c1">ROJO</button>
    <button class="color-btn c2" data-color="c2">AMARILLO</button>
    <button class="color-btn c3" data-color="c3">VERDE</button>
    <button class="color-btn c4" data-color="c4">AZUL</button>
  </div>
  <p class="hint">Pulsa el color correcto · Teclas 1-2-3-4 también valen</p>
</div>
 
<div class="overlay" id="overlay">
  <div class="panel">
    <h2 id="overlayTitle">Color Match</h2>
    <p id="overlayText">Pulsa el botón del color correcto antes de que se acabe el tiempo.<br>¡Cada vez más rápido!</p>
    <button class="btn" id="startBtn">¡Empezar!</button>
  </div>
</div>
 
<script>
const colors = ['c1', 'c2', 'c3', 'c4'];
const colorMap = { c1: '#fb7185', c2: '#facc15', c3: '#22c55e', c4: '#38bdf8' };
 
const target = document.getElementById('target');
const timerFill = document.getElementById('timerFill');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const livesEl = document.getElementById('lives');
const bestEl = document.getElementById('best');
const bestComboEl = document.getElementById('bestCombo');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayText = document.getElementById('overlayText');
const startBtn = document.getElementById('startBtn');
const soundToggle = document.getElementById('soundToggle');
const screenFlash = document.getElementById('screenFlash');
const comboPopup = document.getElementById('comboPopup');
 
let currentColor, score, combo, lives, best, bestCombo, running, timeLeft, maxTime, lastTime;
let sessionMaxCombo = 0;
let soundEnabled = localStorage.getItem('colormatch_sound') !== 'off';
let audioCtx = null;
 
best = parseInt(localStorage.getItem('colormatch_best') || '0');
bestCombo = parseInt(localStorage.getItem('colormatch_bestcombo') || '0');
bestEl.textContent = best;
bestComboEl.textContent = bestCombo;
updateSoundButton();
 
function updateSoundButton() {
  soundToggle.textContent = soundEnabled ? '🔊 Sonido' : '🔇 Sonido';
}
 
soundToggle.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  localStorage.setItem('colormatch_sound', soundEnabled ? 'on' : 'off');
  updateSoundButton();
});
 
function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}
 
function playTone(freq, duration = 0.15, type = 'sine', volume = 0.15) {
  if (!soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
 
function playHit() {
  const baseFreq = 400;
  const freq = baseFreq + Math.min(combo * 40, 800);
  playTone(freq, 0.12, 'triangle', 0.18);
  setTimeout(() => playTone(freq * 1.5, 0.08, 'sine', 0.1), 30);
}
 
function playMiss() {
  playTone(180, 0.25, 'sawtooth', 0.18);
  setTimeout(() => playTone(120, 0.2, 'sawtooth', 0.15), 80);
}
 
function playGameOver() {
  playTone(300, 0.2, 'sawtooth', 0.2);
  setTimeout(() => playTone(200, 0.3, 'sawtooth', 0.18), 200);
  setTimeout(() => playTone(120, 0.5, 'sawtooth', 0.18), 500);
}
 
function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}
 
function flashScreen(gold = false) {
  screenFlash.classList.remove('show', 'gold');
  if (gold) screenFlash.classList.add('gold');
  void screenFlash.offsetWidth;
  screenFlash.classList.add('show');
  setTimeout(() => screenFlash.classList.remove('show'), 300);
}
 
function showComboPopup(text) {
  comboPopup.textContent = text;
  comboPopup.classList.remove('show');
  void comboPopup.offsetWidth;
  comboPopup.classList.add('show');
  setTimeout(() => comboPopup.classList.remove('show'), 800);
}
 
function reset() {
  score = 0;
  combo = 0;
  lives = 3;
  maxTime = 1500;
  sessionMaxCombo = 0;
  running = true;
  updateHUD();
  nextRound();
  lastTime = performance.now();
}
 
function updateHUD() {
  scoreEl.textContent = score;
  comboEl.textContent = combo;
  livesEl.textContent = lives;
}
 
function nextRound() {
  currentColor = colors[Math.floor(Math.random() * colors.length)];
  target.style.background = colorMap[currentColor];
  target.classList.add('flash');
  setTimeout(() => target.classList.remove('flash'), 120);
  timeLeft = maxTime;
  maxTime = Math.max(400, maxTime * 0.97);
}
 
function correctHit() {
  combo++;
  const points = 10 + combo * 2;
  score += points;
  playHit();
 
  if (combo === 5) showComboPopup('¡COMBO x5!');
  if (combo === 10) { showComboPopup('¡COMBO x10!'); flashScreen(false); }
  if (combo === 20) { showComboPopup('¡INCREÍBLE!'); flashScreen(true); }
  if (combo === 30) { showComboPopup('¡LEYENDA!'); flashScreen(true); }
  if (combo > 30 && combo % 10 === 0) { showComboPopup('¡x' + combo + '!'); flashScreen(true); }
 
  if (combo > sessionMaxCombo) {
    sessionMaxCombo = combo;
    if (sessionMaxCombo > bestCombo) {
      bestCombo = sessionMaxCombo;
      localStorage.setItem('colormatch_bestcombo', bestCombo);
      bestComboEl.textContent = bestCombo;
    }
  }
 
  updateHUD();
  nextRound();
}
 
function loseLife() {
  lives--;
  combo = 0;
  playMiss();
  vibrate(120);
  target.classList.add('shake');
  setTimeout(() => target.classList.remove('shake'), 400);
  updateHUD();
  if (lives <= 0) {
    gameOver();
  } else {
    nextRound();
  }
}
 
function gameOver() {
  running = false;
  playGameOver();
  vibrate([100, 50, 100, 50, 200]);
 
  let newRecord = false;
  if (score > best) {
    best = score;
    localStorage.setItem('colormatch_best', best);
    bestEl.textContent = best;
    newRecord = true;
  }
 
  if (newRecord) {
    overlayTitle.textContent = '¡Nuevo récord!';
    overlayText.innerHTML = `Has hecho <strong>${score}</strong> puntos.<br>Mejor combo: <strong>${sessionMaxCombo}</strong>`;
  } else {
    overlayTitle.textContent = '¡Game Over!';
    overlayText.innerHTML = `Puntos: <strong>${score}</strong><br>Récord: <strong>${best}</strong><br>Mejor combo: <strong>${sessionMaxCombo}</strong>`;
  }
  startBtn.textContent = 'Reintentar';
  overlay.classList.remove('hidden');
}
 
function loop(now) {
  const dt = now - lastTime;
  lastTime = now;
  if (running) {
    timeLeft -= dt;
    const pct = Math.max(0, (timeLeft / maxTime) * 100);
    timerFill.style.width = pct + '%';
    if (pct < 25) timerFill.classList.add('danger');
    else timerFill.classList.remove('danger');
    if (timeLeft <= 0) {
      loseLife();
    }
  }
  requestAnimationFrame(loop);
}
 
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!running) return;
    const picked = btn.dataset.color;
    if (picked === currentColor) correctHit();
    else loseLife();
  });
});
 
document.addEventListener('keydown', e => {
  if (!running) return;
  const keyMap = { '1': 'c1', '2': 'c2', '3': 'c3', '4': 'c4' };
  if (keyMap[e.key]) {
    const picked = keyMap[e.key];
    if (picked === currentColor) correctHit();
    else loseLife();
  }
});
 
startBtn.addEventListener('click', () => {
  getAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  overlay.classList.add('hidden');
  reset();
});
 
requestAnimationFrame(loop);
</script>
</body>
</html>
